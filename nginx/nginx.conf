worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            interleave on;
        }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

        location /live/ {
            alias /var/www/origin/live/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                video/mp4 mp4 m4s;
            }
            autoindex on;
        }

        location /ads/ {
            alias /var/www/origin/ads/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                video/mp4 mp4 m4s;
            }
            autoindex on;
        }

        location /healthz {
            return 200 "ok\n";
        }
    }
}
